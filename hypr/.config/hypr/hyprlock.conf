# Layout: clock/date + centred profile photo up top, and a bottom-right cluster
# (greeting -> weather/battery -> password). Colours come from matugen (same pipeline as
# the quickshell bar) and shift with the wallpaper -> ~/.config/matugen/templates/hyprlockTemplate.conf.
#
# NOTE for rotate_wallpaper.sh: the `background { ... path = ... }` block below is what the
# script's sed rewrites on every wallpaper change. Keep that block + its `path =` line intact.

source = /home/leabua/.cache/hypr/hyprlock-colors.conf

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = $base
    path = /home/leabua/Wallpapers/blue_train.png
    blur_passes = 2
    blur_size = 5
}

# ----- centered clock + date (top) -----
label {
    monitor =
    text = $TIME
    font_family = JetBrainsMono Nerd Font
    font_size = 96
    color = $text
    position = 0, 320
    halign = center
    valign = center
    zindex = 5
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    font_family = JetBrainsMono Nerd Font
    font_size = 22
    color = $text
    position = 0, 248
    halign = center
    valign = center
    zindex = 5
}

# ----- circular profile photo, centred under the clock -----
image {
    monitor =
    path = /home/leabua/Documents/profile_pics/lea1.jpg
    size = 140
    rounding = -1
    border_size = 3
    border_color = $accent
    rotate = 0
    reload_time = -1
    position = 0, 110
    halign = center
    valign = center
    zindex = 10
}

# ----- bottom-right cluster: card behind greeting / weather+battery / password -----
shape {
    monitor =
    size = 340, 190
    color = $card_t
    rounding = 22
    border_size = 0
    position = 600, -315
    halign = center
    valign = center
    zindex = 1
}

# greeting (cluster header)
label {
    monitor =
    text = cmd[update:60000] bash -c 'h=$(date +%H); if [ $h -lt 12 ]; then g="Good Morning"; elif [ $h -lt 18 ]; then g="Good Afternoon"; else g="Good Evening"; fi; echo "$g Leabua"'
    font_family = JetBrainsMono Nerd Font
    font_size = 17
    color = $on_card
    position = 600, -260
    halign = center
    valign = center
    zindex = 2
}

shape {
    monitor =
    size = 290, 2
    color = rgba(255,255,255,0.12)
    rounding = 0
    border_size = 0
    position = 600, -288
    halign = center
    valign = center
    zindex = 2
}

# weather (nerd icon reflects current conditions via wttr.in)
label {
    monitor =
    text = cmd[update:900000] bash -c 'w=$(curl -s --max-time 6 "wttr.in/?format=%C|%t" 2>/dev/null); cond="${w%%|*}"; temp="${w##*|}"; [ -z "$temp" ] && temp="--"; cl=$(echo "$cond" | tr "[:upper:]" "[:lower:]"); case "$cl" in *thunder*|*storm*) u=f0593;; *snow*|*sleet*|*blizzard*|*ice*) u=f0598;; *rain*|*drizzle*|*shower*) u=f0597;; *fog*|*mist*|*haze*|*overcast*) u=f0591;; *partly*) u=f0595;; *cloud*) u=f0590;; *clear*|*sunny*) h=$(date +%H); if [ "$h" -ge 6 ] && [ "$h" -lt 19 ]; then u=f0599; else u=f0594; fi;; *) u=f0590;; esac; printf "%b %s" "\U000$u" "$temp"'
    font_family = JetBrainsMono Nerd Font
    font_size = 16
    color = $on_card
    position = 530, -312
    halign = center
    valign = center
    zindex = 2
}

# battery (accent pop)
label {
    monitor =
    text = cmd[update:5000] bash -c 'c=$(cat /sys/class/power_supply/BAT0/capacity); s=$(cat /sys/class/power_supply/BAT0/status); [ "$s" = Charging ] && echo "󰂄 $c%" || echo "󰁾 $c%"'
    font_family = JetBrainsMono Nerd Font
    font_size = 16
    color = $accent
    position = 672, -312
    halign = center
    valign = center
    zindex = 2
}

# password input (bottom of cluster)
input-field {
    monitor =
    size = 290, 44
    position = 600, -365
    halign = center
    valign = center

    inner_color = $card_t
    outer_color = $accent
    outline_thickness = 2

    font_family = JetBrainsMono Nerd Font
    font_color = $on_card

    placeholder_text = <span foreground="##ffffff"> Enter password</span>
    check_color = $accent
    fail_color = rgb(f38ba8)
    fail_text = <span><i>$FAIL ($ATTEMPTS)</i></span>

    rounding = 16
    shadow_passes = 0
    fade_on_empty = false
    zindex = 10
}

auth {
    fingerprint:enabled = true
}
