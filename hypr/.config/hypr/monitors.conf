# See https://wiki.hyprland.org/Configuring/Monitors/
# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Straight 1x setup for low-resolution displays like 1080p or 1440p i.e. The average laptop 
env = GDK_SCALE,1
monitor=,preferred,auto,1

# Laptop plus TV
monitor=eDP-1,1920x1080@60,0x0,1
# watching football (lower resolution)
monitor=HDMI-A-1,1920x1080@60.00Hz,1920x0,1
# higher res
# monitor=HDMI-A-1,3840x2160@50.00hz,1920x0,2

## Assginment of workspaces -> normal
#workspace = 1, monitor:eDP-1
#workspace = 2, monitor:eDP-1
#workspace = 3, monitor:HDMI-A-1
#workspace = 4, monitor:HDMI-A-1
#workspace = 5, monitor:eDP-1

# Assginment of workspaces -> flipped

workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:HDMI-A-1
