#################
### Utilities ###
#################

# Aesthetic choices (all pretty based)
# Hide waybar gracefully
bind = SUPER SHIFT, SPACE, exec, killall -SIGUSR1 waybar
# Toggle transparency on active window 
bind = SUPER, BACKSPACE, setprop, active opaque toggle

# Lock system using hyprlock
bind = SUPER CTRL, L, exec, hyprlock


# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

# Map physical power button to the Power sub-menu in waybar/rofi
bindl = , XF86PowerOff, exec, ~/.config/waybar/scripts/sysmenu.sh --power

# This sends the crop to Satty. Inside Satty, you decide the fate of the file. Noti handled by satty instead of mako
bind = , PRINT, exec, grim -g "$(slurp)" - | satty --filename -

# This captures the whole screen and bypasses Satty/Saving entirely.
bind = SUPER, PRINT, exec, grim - | wl-copy && notify-send "Screenshot" "Monitor copied to clipboard" -i clipboard
