# All of the below work through the waybar
# audio tui window hover rules -> left click audio icon
windowrule {
    name = wiremix-float
    # this matches the --title we set in waybar
    match:title = ^wiremix-term$
    match:class = com.mitchellh.ghostty
    float = yes
    # Increase the first number to push it right
    # Decrease the second number to push it up
    move = 1307 51 
    size = 600 400
}

#bluetooth tui hover rules -> right click audio icon
windowrule {
    name = bluetui-float
    # this matches the --title we set in waybar
    match:title = ^bluetui-term$
