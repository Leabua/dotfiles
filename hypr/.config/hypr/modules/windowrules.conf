# System Menu TUI Rules (Pacseek, PWA, Yazi)
windowrule {
    name = sysmenu-floating-tui
    match:title = ^sysmenu-tui$
    match:class = com.mitchellh.ghostty
    float = yes
    center = yes
    size = 900 600
}
