# If I close the last tmux session it wont just hang around with an empty pane.
set -g detach-on-destroy on
# Mouse support
set -g mouse on
# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
# Easier splits
unbind %
unbind '"'
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# True colour
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set-option -g focus-events on
# =====================================================================
# SMART PANE NAVIGATION (Neovim Aware)
# =====================================================================
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n M-h if-shell "$is_vim" 'send-keys M-h' 'select-pane -L'
bind -n M-j if-shell "$is_vim" 'send-keys M-j' 'select-pane -D'
bind -n M-k if-shell "$is_vim" 'send-keys M-k' 'select-pane -U'
bind -n M-l if-shell "$is_vim" 'send-keys M-l' 'select-pane -R'
bind -n 'M-\' if-shell "$is_vim" 'send-keys M-\\' 'select-pane -l'
bind-key -T copy-mode-vi M-h select-pane -L
bind-key -T copy-mode-vi M-j select-pane -D
bind-key -T copy-mode-vi M-k select-pane -U
bind-key -T copy-mode-vi M-l select-pane -R
# =====================================================================
# Switch windows using Alt + number without prefix
bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
# opencode 25 split instant
unbind o
bind -n M-o split-window -h -p 25 -c "#{pane_current_path}" "opencode"
# =====================================================================
# PLUGINS
# =====================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'b0o/tmux-autoreload'
# =====================================================================
# STATUS BAR — Tokyo Night
# =====================================================================
set -g @plugin 'wfxr/tmux-power'
set -g @tmux_power_theme 'blue'
set -g @tmux_power_g0 "#1a1a1a"

# Clear default left-side sections to remove user@host and session name
set -g @tmux_power_left_a ''
set -g @tmux_power_left_b ''
# Clear default right-side sections to remove date and time
set -g @tmux_power_right_w ''
set -g @tmux_power_right_x ''

# Inject Memory Usage and Uptime into the far-right sections
set -g @tmux_power_right_y '#[bold]󰍛 #(set -- $(free | grep ^Mem:); echo $(($3 * 100 / $2)))%%'
set -g @tmux_power_right_z '#[bold]󰔛 #(s=$(cut -d. -f1 /proc/uptime); echo $((s/3600)):$(printf "%%02d" $((s%%3600/60))))'
# Window tabs
run ~/.config/tmux/plugins/tpm/tpm
# =====================================================================
# OVERRIDES (Must be below the TPM 'run' command)
# =====================================================================

# 1. Completely clear the left status area to ensure zero invisible spaces
set -g status-left ""

# 2. Redefine the active window tab to have a flat left edge
# (Using Tokyo Night Blue #7aa2f7 and your custom background #1a1a1a)
set -g window-status-current-format "#[fg=#1a1a1a,bg=#7aa2f7,bold] #I:#W #[fg=#7aa2f7,bg=#1a1a1a,nobold]"

# 3. Redefine inactive windows to strip out extra spaces
set -g window-status-format "#[fg=#a9b1d6,bg=#1a1a1a] #I:#W "
